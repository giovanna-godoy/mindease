<button class="md:hidden fixed top-4 left-4 z-30 p-2 rounded-lg" [style.backgroundColor]="'var(--primary)'" [style.color]="'white'" (click)="toggleMobileMenu()" aria-label="Menu de navegação" [attr.aria-expanded]="isMobileMenuOpen">
  <mat-icon aria-hidden="true">{{ isMobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
</button>

<div *ngIf="isMobileMenuOpen" class="md:hidden fixed inset-0 bg-black bg-opacity-50 z-30" (click)="closeMobileMenu()" aria-hidden="true"></div>

<aside class="sidebar flex-col h-screen w-64 bg-card border-r border-border p-6 transition-transform duration-300 ease-in-out" [class.hidden]="!isMobileMenuOpen" [class.md:flex]="true" [class.fixed]="true" [class.md:relative]="true" [class.z-40]="true" [class.md:z-auto]="true" [style.backgroundColor]="'var(--card)'" [style.borderColor]="'var(--border)'" role="navigation" aria-label="Menu principal">
  <div class="flex items-center gap-2 mb-8">
    <div class="rounded-lg p-2 flex-shrink-0" [style.backgroundColor]="'var(--primary)'" aria-hidden="true">
      <span class="material-symbols-outlined text-2xl" [style.color]="'white'">neurology</span>
    </div>
    <div>
      <h2 class="font-bold text-lg">MindEase</h2>
      <p class="text-xs" [style.color]="'var(--muted-foreground)'">FIAP Inclusive</p>
    </div>
  </div>

  <nav class="space-y-2 flex-1" aria-label="Navegação principal">
    <button *ngFor="let item of menuItems" (click)="navigate(item.id)" type="button" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-left font-medium" [style.backgroundColor]="currentPage === item.id ? 'var(--primary)' : 'transparent'" [style.color]="currentPage === item.id ? 'var(--primary-foreground)' : 'var(--card-foreground)'" [attr.aria-current]="currentPage === item.id ? 'page' : null">
      <mat-icon class="text-lg" aria-hidden="true">{{ item.icon }}</mat-icon>
      <span>{{ item.label }}</span>
    </button>
  </nav>

  <div class="pt-6 space-y-3" [style.borderTopColor]="'var(--border)'" style="border-top: 1px solid">
    <button (click)="logout()" type="button" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors text-left font-medium text-red-600 hover:bg-red-50" [style.color]="'#DC2626'" aria-label="Sair da conta">
      <mat-icon class="text-lg" aria-hidden="true">logout</mat-icon>
      <span>Sair</span>
    </button>
    
    <div class="rounded-lg p-3" [style.backgroundColor]="'var(--secondary)'" role="complementary" aria-label="Dica">
      <div class="font-medium mb-1 text-sm flex items-center">
        <mat-icon class="material-icons-rounded flex-shrink-0 m-0.5" [style.color]="'var(--primary)'" aria-hidden="true">lightbulb</mat-icon>
        <span>Dica</span>
      </div>
      <div class="text-xs" [style.color]="'var(--muted-foreground)'">
        Use o Painel Cognitivo para ajustar a interface às suas necessidades
      </div>
    </div>
  </div>
</aside>
